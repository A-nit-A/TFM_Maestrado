<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>window.__resources = {};</script>
<script src="./Slides/js/support.js"></script>
</head>
<body>
<template id="dc-template">
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --vigo-blue:#003DA6;
    --bauhaus-red:#E1382D;
    --bauhaus-yellow:#F4B400;
    --ink:#15161A;
    --paper:#F7F3EA;
    --white:#FFFFFF;
    --type-display:148px;
    --type-title:72px;
    --type-subtitle:38px;
    --type-body:29px;
    --type-small:22px;
    --pad-x:110px;
    --pad-top:88px;
    --pad-bottom:80px;
    --gap-item:26px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Roboto',Helvetica,Arial,sans-serif;}
  a{color:var(--vigo-blue);text-decoration:underline;}
  a:hover{color:var(--bauhaus-red);}
</style>
</helmet>
<x-import component-from-global-scope="image-slot" from="./Slides/js/image-slot.js" hint-size="1,1" style="display:none"></x-import>
<x-import component-from-global-scope="deck-stage" from="./Slides/js/deck-stage.js" width="1920" height="1080" hint-size="100%,100%">
</x-import>
</template>

<script type="text/x-dc" data-dc-script data-props="{&quot;bauhausIntensity&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;bold&quot;,&quot;options&quot;:[&quot;subtle&quot;,&quot;bold&quot;],&quot;tsType&quot;:&quot;'subtle'|'bold'&quot;,&quot;section&quot;:&quot;Estilo Bauhaus&quot;},&quot;showPageNumbers&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Estilo Bauhaus&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const intensity = this.props.bauhausIntensity ?? 'bold';
    return {
      shapeOpacity: intensity === 'subtle' ? 0.35 : 0.92,
      showNumbers: this.props.showPageNumbers ?? true,
    };
  }
}
</script>

<script>
(async function() {
  const slideFiles = [
    './Slides/diapositivas/diapositiva_01.html',
    './Slides/diapositivas/diapositiva_02.html',
    './Slides/diapositivas/diapositiva_03.html',
    './Slides/diapositivas/diapositiva_04.html',
    './Slides/diapositivas/diapositiva_05.html',
    './Slides/diapositivas/diapositiva_06.html',
    './Slides/diapositivas/diapositiva_07.html',
    './Slides/diapositivas/diapositiva_08.html'
  ];

  try {
    const responses = await Promise.all(slideFiles.map(file => fetch(file + '?t=' + Date.now())));
    const htmls = await Promise.all(responses.map(res => {
      if (!res.ok) throw new Error("Failed to load slide " + res.url);
      return res.text();
    }));

    const template = document.getElementById('dc-template');
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = template.innerHTML;

    const deckStageImport = tempDiv.querySelector('x-import[component-from-global-scope="deck-stage"]');
    if (deckStageImport) {
      deckStageImport.innerHTML = '\n' + htmls.join('\n') + '\n';
    }

    const xdc = document.createElement('x-dc');
    xdc.innerHTML = tempDiv.innerHTML;
    document.body.appendChild(xdc);

    if (window.__dcBoot) {
      window.__dcBoot();
    }
  } catch (err) {
    console.error("Error loading slides:", err);
  }
})();
</script>
<script>
/* Navegación: cada pulsación avanza/retrocede exactamente 1 diapositiva y maneja la reproducción de vídeos */
(function () {
  function getSlides() {
    return Array.from(document.querySelectorAll('section[data-label]'));
  }

  // Diapositiva actual = la más cercana al borde superior de la ventana
  function currentIndex(slides) {
    let best = 0, bestDist = Infinity;
    slides.forEach(function (s, i) {
      const d = Math.abs(s.getBoundingClientRect().top);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    return best;
  }

  function playActiveVideos() {
    const activeSlide = document.querySelector('[data-deck-active]');
    if (activeSlide) {
      activeSlide.querySelectorAll('video').forEach(function(v) {
        if (v.paused) {
          v.play().catch(function(err) {
            console.log("Autoplay failed/blocked:", err);
          });
        }
      });
    }
  }

  function goTo(i, slides) {
    const idx = Math.max(0, Math.min(slides.length - 1, i));
    slides[idx].scrollIntoView({ behavior: 'auto', block: 'start' });
    setTimeout(playActiveVideos, 100);
  }

  // Reproducir vídeos al hacer click o pulsar teclas (interacción del usuario)
  function bootstrapVideos() {
    playActiveVideos();
    document.removeEventListener('click', bootstrapVideos);
    document.removeEventListener('keydown', bootstrapVideos);
  }
  document.addEventListener('click', bootstrapVideos);
  document.addEventListener('keydown', bootstrapVideos);

  // Escuchar el evento nativo de cambio de diapositiva de deck-stage
  document.addEventListener('slidechange', function(e) {
    const activeSlide = e.detail.slide;
    if (activeSlide) {
      activeSlide.querySelectorAll('video').forEach(function(v) {
        if (v.paused) {
          v.play().catch(function(err) {
            console.log("Slidechange play failed:", err);
          });
        }
      });
    }
  });

  // Intento inicial
  setTimeout(playActiveVideos, 1000);

  const NEXT = ['PageDown', 'ArrowRight', 'ArrowDown', ' ', 'Spacebar'];
  const PREV = ['PageUp', 'ArrowLeft', 'ArrowUp'];

  window.addEventListener('keydown', function (e) {
    // No interferir si se está escribiendo en un campo
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;

    const slides = getSlides();
    if (!slides.length) return;

    let delta = 0;
    if (NEXT.indexOf(e.key) !== -1) delta = 1;
    else if (PREV.indexOf(e.key) !== -1) delta = -1;
    else if (e.key === 'Home') { e.preventDefault(); e.stopPropagation(); goTo(0, slides); return; }
    else if (e.key === 'End') { e.preventDefault(); e.stopPropagation(); goTo(slides.length - 1, slides); return; }
    else return;

    e.preventDefault();      // anula el scroll por defecto del navegador
    e.stopPropagation();     // evita que otro handler avance de más
    goTo(currentIndex(slides) + delta, slides);
  }, true); // fase de captura: se ejecuta antes que los handlers del deck
})();
</script>
</body>
</html>
