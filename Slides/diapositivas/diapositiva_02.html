<!-- Diapositiva 02: Introducción (Capítulo 1) -->
<section data-label="Capítulo" data-screen-label="02"
  data-speaker-notes="Portada de capítulo: número, título y subapartados que contiene."
  style="position:relative;width:100%;height:100%;background:var(--vigo-blue);overflow:hidden;display:flex;">
  <div
    style="position:absolute;left:-180px;top:-180px;width:520px;height:520px;border-radius:50%;border:26px solid var(--bauhaus-red);opacity:{{shapeOpacity}};">
  </div>
  <div
    style="position:absolute;right:-90px;top:40%;width:0;height:0;border-top:220px solid transparent;border-bottom:220px solid transparent;border-right:340px solid var(--bauhaus-yellow);opacity:{{shapeOpacity}};">
  </div>


  <div style="position:relative;flex:1;display:flex;flex-direction:column;padding:56px var(--pad-x) var(--pad-bottom);">

    <!-- Cabecera -->
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
      <div
        style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
        <img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;">
      </div>
      <div
        style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
        <img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;">
      </div>
    </div>

    <!-- Contenido -->
    <div style="flex:1;display:flex;align-items:flex-end;gap:90px;">
      <div style="max-width:900px;">
        <div style="font-size:220px;font-weight:900;color:var(--bauhaus-yellow);line-height:0.85;">01</div>
        <h2 style="margin:8px 0 0;font-size:var(--type-title);font-weight:900;color:var(--white);letter-spacing:-1px;">
          Introducción</h2>
        <ul style="margin:40px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:16px;">
          <li
            style="display:flex;align-items:center;gap:18px;font-size:26px;color:rgba(255,255,255,0.85);font-weight:300;">
            <span style="width:14px;height:14px;background:var(--bauhaus-red);flex:none;"></span>
            Contexto y
            justificación
          </li>
          <li
            style="display:flex;align-items:center;gap:18px;font-size:26px;color:rgba(255,255,255,0.85);font-weight:300;">
            <span style="width:14px;height:14px;border-radius:50%;background:var(--bauhaus-yellow);flex:none;"></span>
            Objetivo
          </li>
          <li
            style="display:flex;align-items:center;gap:18px;font-size:26px;color:rgba(255,255,255,0.85);font-weight:300;">
            <span style="width:14px;height:14px;background:var(--white);flex:none;"></span>
            LLM
          </li>
          <li
            style="display:flex;align-items:center;gap:18px;font-size:26px;color:rgba(255,255,255,0.85);font-weight:300;">
            <span style="width:14px;height:14px;background:var(--ink);flex:none;"></span>
            Como hablar con la IA
          </li>
        </ul>
      </div>
    </div>
  </div>

  <sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
    <div
      style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--bauhaus-yellow);display:flex;align-items:center;justify-content:center;">
      <span style="font-size:24px;font-weight:900;color:var(--ink);">02</span>
    </div>
  </sc-if>
</section>
