<!-- Diapositiva 21: Cierre y agradecimientos -->
<section data-label="Cierre" data-screen-label="21"
  data-speaker-notes="Diapositiva de cierre: agradecimiento y datos de contacto."
  style="position:relative;width:100%;height:100%;background:var(--vigo-blue);overflow:hidden;display:flex;flex-direction:column;">
  <div
    style="position:absolute;left:50%;top:-300px;width:640px;height:640px;border-radius:50%;background:var(--bauhaus-yellow);opacity:{{shapeOpacity}};transform:translateX(-50%);">
  </div>
  <div
    style="position:absolute;right:60px;bottom:180px;width:0;height:0;border-left:130px solid transparent;border-right:130px solid transparent;border-bottom:200px solid var(--bauhaus-red);opacity:{{shapeOpacity}};">
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;padding:56px var(--pad-x) 0;">
    <div
      style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
      <img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;">
    </div>
    <div
      style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
      <img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;">
    </div>
  </div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
    <h2 style="margin:0;font-size:120px;font-weight:900;color:var(--white);
  letter-spacing:-2px;">
      Gracias
    </h2>
    <p style="margin:24px 0 0;font-size:var(--type-subtitle);font-weight:300;
  color:rgba(255,255,255,0.85);">
      Ricardo Rodríguez Vidal
    </p>
    <div style="margin-top:36px;width:120px;height:6px;background:var(--bauhaus-red);"></div>
  </div>

  <sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
    <div
      style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--bauhaus-yellow);display:flex;align-items:center;justify-content:center;">
      <span style="font-size:24px;font-weight:900;color:var(--ink);">21</span>
    </div>
  </sc-if>
</section>
