<!-- Diapositiva 04: Objetivos específicos -->
<section data-label="Objetivos (lista + imagen)" data-screen-label="04" data-speaker-notes="Lista de objetivos específicos junto a una imagen de apoyo." style="position:relative;width:100%;height:100%;background:var(--paper);overflow:hidden;display:flex;flex-direction:column;">
<div style="position:absolute;left:-60px;bottom:-60px;width:200px;height:200px;border-radius:50%;background:var(--bauhaus-red);opacity:{{shapeOpacity}};"></div>

<div style="display:flex;align-items:center;justify-content:space-between;padding:56px var(--pad-x) 0;">
  <div style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);"><img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;"></div>
  <div style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);"><img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;"></div>
</div>

<div style="flex:1;display:flex;gap:80px;padding:40px var(--pad-x) var(--pad-bottom);align-items:stretch;">
  <div style="flex:1;display:flex;flex-direction:column;">
    <span style="font-size:var(--type-small);letter-spacing:3px;font-weight:700;color:var(--vigo-blue);text-transform:uppercase;">02 · Objetivos</span>
    <h2 style="margin:14px 0 0;font-size:56px;font-weight:900;color:var(--ink);letter-spacing:-1px;">Objetivos específicos</h2>
    <ul style="margin:40px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:var(--gap-item);">
      <li style="display:flex;gap:22px;align-items:flex-start;"><span style="flex:none;width:40px;height:40px;background:var(--bauhaus-red);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;">1</span><span style="font-size:var(--type-body);font-weight:300;color:#3B3C42;padding-top:4px;">Analizar el estado del arte sobre el tema de estudio.</span></li>
      <li style="display:flex;gap:22px;align-items:flex-start;"><span style="flex:none;width:40px;height:40px;border-radius:50%;background:var(--bauhaus-yellow);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;">2</span><span style="font-size:var(--type-body);font-weight:300;color:#3B3C42;padding-top:4px;">Diseñar la metodología de recogida de datos.</span></li>
      <li style="display:flex;gap:22px;align-items:flex-start;"><span style="flex:none;width:40px;height:40px;background:var(--vigo-blue);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;">3</span><span style="font-size:var(--type-body);font-weight:300;color:#3B3C42;padding-top:4px;">Evaluar los resultados obtenidos frente a los objetivos.</span></li>
      <li style="display:flex;gap:22px;align-items:flex-start;"><span style="flex:none;width:40px;height:40px;background:var(--ink);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;">4</span><span style="font-size:var(--type-body);font-weight:300;color:#3B3C42;padding-top:4px;">Proponer líneas de trabajo futuro.</span></li>
    </ul>
  </div>
  <div style="flex:1;position:relative;">
    <image-slot id="obj-img" shape="rect" placeholder="Imagen de apoyo" style="width:100%;height:100%;"></image-slot>
  </div>
</div>

<sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
  <div style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--vigo-blue);display:flex;align-items:center;justify-content:center;">
    <span style="font-size:24px;font-weight:900;color:var(--white);">04</span>
  </div>
</sc-if>
</section>
