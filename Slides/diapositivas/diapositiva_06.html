<!-- Diapositiva 06: Como hablar con la IA -->
<section data-label="Como hablar con la IA" data-screen-label="06"
  style="position:relative;width:100%;height:100%;background:var(--paper);overflow:hidden;display:flex;flex-direction:column;">
  <style>
    #context-ia-img::part(image) {
      width: 100% !important;
      height: 100% !important;
      left: 50% !important;
      top: 50% !important;
      object-fit: fill !important;
    }
  </style>
  <div
    style="position:absolute;right:-70px;top:-70px;width:220px;height:220px;background:var(--bauhaus-yellow);opacity:{{shapeOpacity}};">
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;padding:56px var(--pad-x) 0;">
    <div
      style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
      <img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;">
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="width:16px;height:16px;background:var(--bauhaus-red);"></span>
      <span
        style="font-size:var(--type-small);letter-spacing:3px;font-weight:700;color:var(--vigo-blue);text-transform:uppercase;">01
        · Introducción</span>
    </div>
    <div
      style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
      <img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;">
    </div>
  </div>

  <div style="flex:1;display:flex;align-items:center;gap:96px;padding:0 var(--pad-x) var(--pad-bottom);">
    <image-slot id="context-ia-img" fit="fill" src="./Slides/imgs/Prompt.png" placeholder="Prompt"
      style="flex:none;width:340px;height:340px;"></image-slot>
    <div style="max-width:1150px;">
      <h2 style="margin:0;font-size:var(--type-title);font-weight:900;
      color:var(--ink);letter-spacing:-1px;">
        Cómo hablar con la IA
      </h2>
      <ul style="margin:28px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:18px;">
        <li style="display:flex;gap:22px;align-items:flex-start;"><span style="flex:none;width:240px;height:40px;background:var(--bauhaus-red);
            color:var(--white);display:flex;align-items:center;justify-content:center;
            font-weight:700;font-size:24px;">
            Prompt</span>
          <span style="font-size:var(--type-body);font-weight:300;color:#3B3C42;padding-top:4px;">
            Las instrucciones que le damos.</span>
        </li>
        <li style="display:flex;gap:22px;align-items:flex-start;"><span style="flex:none;width:240px;height:40px;background:var(--bauhaus-yellow);
            color:var(--white);display:flex;align-items:center;justify-content:center;
            font-weight:700;font-size:24px;">
            Prompt Engineering</span>
          <span style="font-size:var(--type-body);font-weight:300;color:#3B3C42;padding-top:4px;">
            El arte de diseñar prompts para obtener mejores respuestas.
          </span>
        </li>
        <li style="display:flex;gap:22px;align-items:flex-start;"><span style="flex:none;width:240px;height:40px;background:var(--vigo-blue);
            color:var(--white);display:flex;align-items:center;justify-content:center;
            font-weight:700;font-size:24px;">
            Meta Prompting</span>
          <span style="font-size:var(--type-body);font-weight:300;color:#3B3C42;padding-top:4px;">
            Usar la IA para mejorar prompts.
          </span>
        </li>
      </ul>
    </div>
  </div>

  <sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
    <div
      style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--vigo-blue);display:flex;align-items:center;justify-content:center;">
      <span style="font-size:24px;font-weight:900;color:var(--white);">06</span>
    </div>
  </sc-if>
</section>
