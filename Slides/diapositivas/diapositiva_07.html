<!-- Diapositiva 07: Conclusiones (Dato destacado) -->
<section data-label="Dato destacado" data-screen-label="07" data-speaker-notes="Cifra o cita destacada, un dato clave de las conclusiones." style="position:relative;width:100%;height:100%;background:var(--ink);overflow:hidden;display:flex;flex-direction:column;">
<div style="position:absolute;right:-160px;bottom:-160px;width:480px;height:480px;border-radius:50%;background:var(--bauhaus-red);opacity:{{shapeOpacity}};"></div>
<div style="position:absolute;left:80px;top:120px;width:90px;height:90px;background:var(--bauhaus-yellow);opacity:{{shapeOpacity}};"></div>

<div style="display:flex;align-items:center;justify-content:space-between;padding:56px var(--pad-x) 0;">
  <div style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);"><img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;"></div>
  <div style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);"><img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;"></div>
</div>

<div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 var(--pad-x) var(--pad-bottom);max-width:1500px;">
  <span style="font-size:var(--type-small);letter-spacing:4px;font-weight:700;color:var(--bauhaus-yellow);text-transform:uppercase;">05 · Conclusiones</span>
  <p style="margin:30px 0 0;font-size:56px;font-weight:300;color:var(--white);line-height:1.3;max-width:1300px;">“Cita o hallazgo principal que resume la contribución más relevante del trabajo.”</p>
  <div style="margin-top:48px;display:flex;align-items:center;gap:24px;">
    <div style="width:70px;height:4px;background:var(--bauhaus-red);"></div>
    <span style="font-size:24px;color:rgba(255,255,255,0.7);font-weight:300;">Fuente o referencia del dato</span>
  </div>
</div>

<sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
  <div style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--bauhaus-yellow);display:flex;align-items:center;justify-content:center;">
    <span style="font-size:24px;font-weight:900;color:var(--ink);">07</span>
  </div>
</sc-if>
</section>
