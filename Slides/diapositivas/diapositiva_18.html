<!-- Diapositiva 18: Verificación de la hipótesis -->
<section data-label="Verificación de la hipótesis" data-screen-label="18" style="position:relative;width:100%;height:100%;background:var(--paper);overflow:hidden;
  display:flex;flex-direction:column;">
  <div
    style="position:absolute;right:-160px;bottom:-160px;width:480px;height:480px;border-radius:50%;background:var(--bauhaus-red);opacity:{{shapeOpacity}};">
  </div>
  <div
    style="position:absolute;left:80px;top:120px;width:90px;height:90px;background:var(--bauhaus-yellow);opacity:{{shapeOpacity}};">
  </div>

  <!-- Cabecera -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:56px var(--pad-x) 0;">

    <!-- Logo Universidad -->
    <div
      style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
      <img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;">
    </div>

    <!-- Capítulo -->
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="width:16px;height:16px;background:var(--vigo-blue);"></span>
      <span
        style="font-size:var(--type-small);letter-spacing:3px;font-weight:700;color:var(--bauhaus-yellow);text-transform:uppercase;">
        04 - Discusión y Conclusiones
      </span>
    </div>

    <!-- Logo Máster -->
    <div
      style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
      <img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;">
    </div>

  </div>

  <!-- Apartado -->
  <div
    style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 var(--pad-x) var(--pad-bottom);max-width:1500px;">
    <h2 style="margin:14px 0 0;font-size:56px;font-weight:900;color:var(--ink);letter-spacing:-1px;">
      Verificación de la hipótesis
    </h2>
    <p style="margin:30px 0 0;font-size:48px;font-weight:300;color:var(--ink);
    line-height:1.3;max-width:1300px;">
      Los resultados de la encuesta demuestra que con una documentación bien estructurada
      y con supervisión por parte del docente, con la ayuda de la IA se pueden
      crear exámenes con preguntas tipo test de calidad y ahorrar tiempo.
    </p>

  </div>

  <!-- Footer -->
  <sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
    <div
      style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--bauhaus-yellow);display:flex;align-items:center;justify-content:center;">
      <span style="font-size:24px;font-weight:900;color:var(--ink);">18</span>
    </div>
  </sc-if>
</section>
