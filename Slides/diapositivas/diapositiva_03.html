<!-- Diapositiva 03: Punto clave de la Introducción -->
<section data-label="Punto del capítulo" data-screen-label="03" data-speaker-notes="Un único punto o idea clave del capítulo, con una cifra o dato de apoyo." style="position:relative;width:100%;height:100%;background:var(--paper);overflow:hidden;display:flex;flex-direction:column;">
<div style="position:absolute;right:-70px;top:-70px;width:220px;height:220px;background:var(--bauhaus-yellow);opacity:{{shapeOpacity}};"></div>

<div style="display:flex;align-items:center;justify-content:space-between;padding:56px var(--pad-x) 0;">
  <div style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);"><img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;"></div>
  <div style="display:flex;align-items:center;gap:14px;">
    <span style="width:16px;height:16px;background:var(--bauhaus-red);"></span>
    <span style="font-size:var(--type-small);letter-spacing:3px;font-weight:700;color:var(--vigo-blue);text-transform:uppercase;">01 · Introducción</span>
  </div>
  <div style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);"><img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;"></div>
</div>

<div style="flex:1;display:flex;align-items:center;gap:96px;padding:0 var(--pad-x) var(--pad-bottom);">
  <div style="flex:none;width:340px;height:340px;border-radius:50%;background:var(--vigo-blue);display:flex;align-items:center;justify-content:center;">
    <span style="font-size:120px;font-weight:900;color:var(--white);">87%</span>
  </div>
  <div style="max-width:1000px;">
    <h2 style="margin:0;font-size:var(--type-title);font-weight:900;color:var(--ink);letter-spacing:-1px;">Punto clave del apartado</h2>
    <p style="margin:28px 0 0;font-size:var(--type-body);font-weight:300;color:#3B3C42;line-height:1.5;">Desarrollo breve de la idea principal que sostiene este punto del capítulo, con el dato o evidencia que la respalda.</p>
  </div>
</div>

<sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
  <div style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--vigo-blue);display:flex;align-items:center;justify-content:center;">
    <span style="font-size:24px;font-weight:900;color:var(--white);">03</span>
  </div>
</sc-if>
</section>
