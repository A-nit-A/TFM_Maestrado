<!-- Diapositiva 06: Resultados obtenidos -->
<section data-label="Resultados (3 imágenes)" data-screen-label="06" data-speaker-notes="Tres imágenes de resultados, cada una con su propia descripción." style="position:relative;width:100%;height:100%;background:var(--paper);overflow:hidden;display:flex;flex-direction:column;">
<div style="position:absolute;left:-100px;bottom:-100px;width:0;height:0;border-left:160px solid transparent;border-right:160px solid transparent;border-bottom:240px solid var(--vigo-blue);opacity:{{shapeOpacity}};"></div>

<div style="display:flex;align-items:center;justify-content:space-between;padding:56px var(--pad-x) 0;">
  <div style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);"><img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;"></div>
  <div style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);"><img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;"></div>
</div>

<div style="padding:32px var(--pad-x) 0;">
  <span style="font-size:var(--type-small);letter-spacing:3px;font-weight:700;color:var(--vigo-blue);text-transform:uppercase;">04 · Resultados</span>
  <h2 style="margin:14px 0 0;font-size:56px;font-weight:900;color:var(--ink);letter-spacing:-1px;">Resultados obtenidos</h2>
</div>

<div style="flex:1;display:flex;gap:56px;padding:36px var(--pad-x) var(--pad-bottom);">
  <div style="flex:1;display:flex;flex-direction:column;gap:20px;">
    <image-slot id="res-img-1" shape="rect" placeholder="Resultado 1" style="width:100%;height:340px;"></image-slot>
    <div style="width:56px;height:6px;background:var(--bauhaus-red);"></div>
    <p style="margin:0;font-size:24px;font-weight:300;color:#3B3C42;line-height:1.45;">Descripción breve del primer resultado destacado del estudio.</p>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:20px;">
    <image-slot id="res-img-2" shape="rect" placeholder="Resultado 2" style="width:100%;height:340px;"></image-slot>
    <div style="width:56px;height:6px;background:var(--bauhaus-yellow);"></div>
    <p style="margin:0;font-size:24px;font-weight:300;color:#3B3C42;line-height:1.45;">Descripción breve del segundo resultado destacado del estudio.</p>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:20px;">
    <image-slot id="res-img-3" shape="rect" placeholder="Resultado 3" style="width:100%;height:340px;"></image-slot>
    <div style="width:56px;height:6px;background:var(--vigo-blue);"></div>
    <p style="margin:0;font-size:24px;font-weight:300;color:#3B3C42;line-height:1.45;">Descripción breve del tercer resultado destacado del estudio.</p>
  </div>
</div>

<sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
  <div style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--vigo-blue);display:flex;align-items:center;justify-content:center;">
    <span style="font-size:24px;font-weight:900;color:var(--white);">06</span>
  </div>
</sc-if>
</section>
