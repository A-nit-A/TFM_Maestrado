<!-- Diapositiva 13: Perfil docente y actitud -->
<section data-label="Perfil del profesorado" data-screen-label="13"
  data-speaker-notes="Perfil del profesorado encuestado y su actitud y frecuencia de uso de la IA."
  style="position:relative;width:100%;height:100%;background:var(--grey);overflow:hidden;display:flex;flex-direction:column;">
  <div
    style="position:absolute;left:-100px;bottom:-100px;width:0;height:0;border-left:160px solid transparent;border-right:160px solid transparent;border-bottom:240px solid var(--vigo-blue);opacity:{{shapeOpacity}};">
  </div>

  <!-- Cabecera -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:56px var(--pad-x) 0;">
    <!-- Logo Universidad -->
    <div
      style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
      <img src="./Slides/imgs/logo.png" alt="Logo Universidad" style="width:280px;height:78px;object-fit:contain;">
    </div>

    <!-- Capítulo -->
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="width:16px;height:16px;background:var(--white);"></span>
      <span
        style="font-size:var(--type-small);letter-spacing:3px;font-weight:700;color:var(--vigo-blue);text-transform:uppercase;">
        03 - RESULTADOS
      </span>
    </div>

    <!-- Logo Máster -->
    <div
      style="position:relative;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.55);padding:10px 18px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.30);">
      <img src="./Slides/imgs/logo_master.png" alt="Logo Máster" style="width:280px;height:78px;object-fit:contain;">
    </div>
  </div>

  <!-- Apartado -->
  <div style="padding:32px var(--pad-x) 0;">
    <h2 style="margin:14px 0 0;font-size:56px;font-weight:900;color:var(--ink);letter-spacing:-1px;">
      Perfil del profesorado y su actitud hacia la IA
    </h2>
  </div>

  <div style="flex:1;display:flex;gap:56px;padding:36px var(--pad-x) var(--pad-bottom);">
    <div style="flex:1;display:flex;flex-direction:column;gap:20px;">
      <!-- Wrapper Clickable para el modal -->
      <div onclick="document.getElementById('image-modal').style.display='flex';" 
           style="cursor:zoom-in;transition:transform 0.2s ease-in-out;"
           onmouseover="this.style.transform='scale(1.02)';"
           onmouseout="this.style.transform='scale(1)';"
           title="Hacer clic para ampliar gráfica">
        <image-slot id="profile-img-1" shape="rect" src="./Slides/imgs/Graficas/Perfil del docente.png" placeholder="Perfil del docente" style="width:100%;height:340px;pointer-events:none;"></image-slot>
      </div>
      <div style="width:56px;height:6px;background:var(--bauhaus-red);"></div>
      <p style="margin:0;font-size:24px;font-weight:300;color:#3B3C42;line-height:1.45;">
        Perfil del docente
      </p>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:20px;">
      <image-slot id="profile-img-2" shape="rect" placeholder="Frecuencia de uso" style="width:100%;height:340px;"></image-slot>
      <div style="width:56px;height:6px;background:var(--bauhaus-yellow);"></div>
      <p style="margin:0;font-size:24px;font-weight:300;color:#3B3C42;line-height:1.45;">
        Frecuencia de uso de la IA
      </p>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:20px;">
      <image-slot id="profile-img-3" shape="rect" placeholder="Actitud" style="width:100%;height:340px;"></image-slot>
      <div style="width:56px;height:6px;background:var(--vigo-blue);"></div>
      <p style="margin:0;font-size:24px;font-weight:300;color:#3B3C42;line-height:1.45;">
        Actitud hacia el uso de la IA
      </p>
    </div>
  </div>

  <!-- Modal para ver la imagen en grande -->
  <div id="image-modal" 
       onclick="this.style.display='none'" 
       style="display:none;position:absolute;inset:0;background:rgba(21,22,26,0.92);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:zoom-out;transition:all 0.25s ease-in-out;">
    <img src="./Slides/imgs/Graficas/Perfil del docente.png" 
         alt="Perfil del docente ampliado" 
         style="max-width:92%;max-height:88%;border-radius:12px;box-shadow:0 24px 64px rgba(0,0,0,0.6);object-fit:contain;transition:transform 0.25s;"
         onmouseover="this.style.transform='scale(1.01)';"
         onmouseout="this.style.transform='scale(1)';" />
    <div style="position:absolute;top:40px;right:40px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:28px;font-weight:900;cursor:pointer;transition:background 0.2s;"
         onmouseover="this.style.background='rgba(255,255,255,0.25)';"
         onmouseout="this.style.background='rgba(255,255,255,0.15)';">
      &times;
    </div>
  </div>

  <!-- Footer -->
  <sc-if value="{{showNumbers}}" hint-placeholder-val="{{true}}">
    <div
      style="position:absolute;right:64px;bottom:64px;width:60px;height:60px;background:var(--vigo-blue);display:flex;align-items:center;justify-content:center;">
      <span style="font-size:24px;font-weight:900;color:var(--white);">13</span>
    </div>
  </sc-if>
</section>
